<style>
:root{
  --red:#E8192C;--red-glow:rgba(232,25,44,.4);--red-dim:rgba(232,25,44,.1);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}

  opacity:.022}
#cur{width:10px;height:10px;background:var(--red);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}

nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:1rem 3.5rem;background:rgba(8,8,9,.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--gb);transition:padding .3s}

.ncta{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:.45rem 1.1rem;text-decoration:none;transition:background .2s,color .2s}

.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}

.g-idle,.g-watch,.g-ready{display:none}

.ring{position:relative;width:62px;height:62px}

.rb{fill:none;stroke:var(--muted2);stroke-width:3}
.rp{fill:none;stroke:var(--red);stroke-width:3;stroke-linecap:round;stroke-dasharray:163;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}
.rnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--red)}
.bdl{background:var(--green);color:#fff;border:none;cursor:pointer;padding:1rem 1.8rem;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;width:100%}
.wa{position:fixed;bottom:2rem;right:2rem;z-index:850;width:52px;height:52px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center}
footer{background:var(--bg2);border-top:1px solid var(--gb);padding:2rem 3.5rem;display:flex;align-items:center;justify-content:space-between}
</style>

<script>
const DB=[
  {id:"f01",c:"font",title:"Neon Glow Text Style",desc:"Professional neon glow layer style for Photoshop.",fmt:"ASL",sz:"1.2 MB"},
  {id:"f02",c:"font",title:"Chrome Metal Effect",desc:"Realistic chrome Photoshop text effect.",fmt:"PSD",sz:"4.8 MB"},
  {id:"b01",c:"bg",title:"Dark Red Bokeh",desc:"Ultra-HD dark red bokeh background.",fmt:"PNG",sz:"8.4 MB"},
  {id:"p01",c:"psd",title:"YouTube Thumbnail Template",desc:"Editable PSD thumbnail template.",fmt:"PSD",sz:"35 MB"}
];

let activeCat="all", activeItem=null, timer=null;
const SECS=5, CIRC=163;

function renderGrid(){
  const items = activeCat==="all" ? DB : DB.filter(x=>x.c===activeCat);
  const g1 = document.getElementById("grid1");
  const g2 = document.getElementById("grid2");
  g1.innerHTML = items.slice(0,6).map(i=>cardH(i)).join('');
  g2.innerHTML = items.slice(6).map(i=>cardH(i)).join('');
}

function cardH(i){
  return `<div class="card" onclick="openItem('${i.id}')">
    <div class="cthumb tf">
      <div class="cbadge">FREE</div>
      <div class="cfmt">${i.fmt}</div>
      <div class="cov"><span>View</span></div>
    </div>
    <div class="cinfo"><div class="ctitle">${i.title}</div><div class="cmeta"><span>${i.sz}</span></div></div>
  </div>`;
}

function openItem(id){
  activeItem = DB.find(x=>x.id===id);
  document.getElementById("vGrid").style.display="none";
  document.getElementById("vDetail").style.display="block";
  document.getElementById("dTitle").textContent=activeItem.title;
  document.getElementById("dDesc").textContent=activeItem.desc;
  document.getElementById("dPrev").innerHTML=`<div class="dpbadge">FREE</div><div class="dpfmt">${activeItem.fmt}</div>`;
  resetGate();
}

function startGate(){
  document.getElementById("gIdle").classList.remove("on");
  document.getElementById("gWatch").classList.add("on");
  let rem=SECS;
  timer=setInterval(()=>{
    rem--;
    document.getElementById("rnum").textContent=rem;
    document.getElementById("rp").style.strokeDashoffset=((SECS-rem)/SECS)*CIRC;
    if(rem<=0){
      clearInterval(timer);
      document.getElementById("gWatch").classList.remove("on");
      document.getElementById("gReady").classList.add("on");
    }
  },1000);
}

function resetGate(){
  if(timer)clearInterval(timer);
  document.getElementById("gIdle").classList.add("on");
  document.getElementById("gWatch").classList.remove("on");
  document.getElementById("gReady").classList.remove("on");
  document.getElementById("rp").style.strokeDashoffset=0;
  document.getElementById("rnum").textContent=SECS;
}

function doDL(){ alert("Download starting for: "+activeItem.title); }

function filt(c){ activeCat=c; renderGrid(); document.getElementById("vGrid").style.display="block"; document.getElementById("vDetail").style.display="none"; }

// Cursor logic
const $c=document.getElementById("cur"),$r=document.getElementById("cur-r");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;$c.style.left=mx+"px";$c.style.top=my+"px"});
(function L(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;$r.style.left=rx+"px";$r.style.top=ry+"px";requestAnimationFrame(L)})();

renderGrid();
</script>
