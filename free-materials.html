<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Free Resources - Reddy Design Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --red:#E8192C;--red-glow:rgba(232,25,44,.4);--red-dim:rgba(232,25,44,.1);
  --bg:#080809;--bg2:#0f0f11;--bg3:#18181b;
  --glass:rgba(255,255,255,.035);--gb:rgba(255,255,255,.08);
  --text:#f2efe9;--muted:#6b6b74;--muted2:#3a3a3f;
  --green:#22c55e;--green-glow:rgba(34,197,94,.35);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.022}
#cur{width:10px;height:10px;background:var(--red);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .1s}
#cur-r{width:32px;height:32px;border:1px solid rgba(232,25,44,.45);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .25s cubic-bezier(.22,1,.36,1),top .25s cubic-bezier(.22,1,.36,1),width .3s,height .3s}
nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:1rem 3.5rem;background:rgba(8,8,9,.8);backdrop-filter:blur(24px);border-bottom:1px solid var(--gb);transition:padding .3s}
nav.scrolled{padding:.65rem 3.5rem;background:rgba(8,8,9,.95)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.55rem;letter-spacing:.1em;color:var(--text);text-decoration:none}
.logo span{color:var(--red)}
.nl{display:flex;gap:2.2rem;list-style:none}
.nl a{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;position:relative;transition:color .2s}
.nl a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--red);transition:width .3s}
.nl a:hover,.nl a.active{color:var(--text)}
.nl a:hover::after,.nl a.active::after{width:100%}
.ncta{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:.45rem 1.1rem;text-decoration:none;transition:background .2s,color .2s}
.ncta:hover{background:var(--red);color:#fff}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.burger span{display:block;width:22px;height:1.5px;background:var(--text)}
@media(max-width:860px){nav{padding:1rem 1.5rem}.nl,.ncta{display:none}.burger{display:flex}}
.drawer{display:none;position:fixed;inset:0;background:rgba(8,8,9,.97);z-index:795;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.drawer.open{display:flex}
.drawer a{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.08em;color:var(--text);text-decoration:none;transition:color .2s}
.drawer a:hover{color:var(--red)}
.dx{position:absolute;top:1.4rem;right:1.8rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.ph{padding:8.5rem 3.5rem 3.5rem;border-bottom:1px solid var(--gb);display:grid;grid-template-columns:1fr auto;align-items:end;gap:2rem;position:relative;overflow:hidden}
.ph-tag{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:.9rem;display:flex;align-items:center;gap:.7rem}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,7vw,6rem);line-height:.95}
.ph-title span{color:var(--red)}
.ph-sub{font-size:.9rem;line-height:1.8;color:var(--muted);max-width:480px;margin-top:1rem}
.ph-stats{display:flex;gap:2rem;flex-shrink:0}
.st .n{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--text);line-height:1}
.st .n em{color:var(--red);font-style:normal}
.st .l{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
@media(max-width:768px){.ph{grid-template-columns:1fr;padding:7.5rem 1.5rem 3rem}.ph-stats{display:none}}
.wrap{display:grid;grid-template-columns:1fr 300px;gap:2rem;padding:2.5rem 3.5rem 6rem;align-items:start}
@media(max-width:1050px){.wrap{grid-template-columns:1fr;padding:2rem 1.5rem 5rem}.sidebar{display:none}}
.adph{width:100%;background:var(--glass);border:1px dashed rgba(255,255,255,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:.8rem}
.adlbl{font-size:.54rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.16)}
.adsz{font-size:.6rem;color:rgba(255,255,255,.09)}
.tabs{display:flex;gap:.45rem;flex-wrap:wrap;margin-bottom:1.8rem}
.tab{display:flex;align-items:center;gap:.5rem;font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;padding:.48rem 1.1rem;border:1px solid var(--gb);background:none;color:var(--muted);cursor:pointer;transition:all .2s;font-family:'DM Sans',sans-serif}
.tab.on,.tab:hover{background:var(--red);border-color:var(--red);color:#fff}
.tab .badge{background:rgba(255,255,255,.18);padding:0 .4rem;font-size:.56rem;border-radius:2px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--gb)}
@media(max-width:680px){.grid{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--bg2);cursor:pointer;position:relative;overflow:hidden;transition:background .25s;display:flex;flex-direction:column}
.card:hover{background:var(--bg3)}
.cthumb{height:118px;display:flex;align-items:center;justify-content:center;position:relative}
.tf{background:linear-gradient(135deg,#14060a,#240c12)}
.tb{background:linear-gradient(135deg,#060e18,#0c1a2c)}
.tp{background:linear-gradient(135deg,#0c1606,#16220a)}
.tv{background:linear-gradient(135deg,#120614,#1e0a20)}
.cbadge{position:absolute;top:.5rem;left:.5rem;font-size:.54rem;background:var(--red);padding:.14rem .5rem}
.cinfo{padding:.88rem 1rem 1rem}
.ctitle{font-size:.84rem;font-weight:500;margin-bottom:.3rem}
.cmeta{font-size:.66rem;color:var(--muted);display:flex;justify-content:space-between}
.dlp{background:var(--glass);border:1px solid var(--gb);padding:1.8rem;position:relative}
.g-idle,.g-watch,.g-ready{display:none}.on{display:block}
.bwatch,.bdl{background:var(--red);color:#fff;border:none;cursor:pointer;padding:.9rem;width:100%;text-transform:uppercase;letter-spacing:.1em;font-size:.75rem}
.bdl{background:var(--green)}
footer{background:var(--bg2);border-top:1px solid var(--gb);padding:2rem 3.5rem;display:flex;justify-content:space-between}
.wa{position:fixed;bottom:2rem;right:2rem;width:52px;height:52px;background:#25d366;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:1000}
</style>
</head>
<body>
<div id="cur"></div><div id="cur-r"></div>

<nav id="nav">
  <a href="index.html" class="logo">Reddy<span>.</span></a>
  <ul class="nl">
    <li><a href="index.html">Home</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="free-materials.html" class="active">Free Materials</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="contact.html" class="ncta">Hire Us</a>
</nav>

<div class="ph">
  <div>
    <h1 class="ph-title">Free <span>Resources</span></h1>
    <p class="ph-sub">Your Google Drive assets are now live here automatically. Watch a 5s ad to unlock downloads.</p>
  </div>
  <div class="ph-stats">
    <div class="st"><div class="n" id="totalCount">0</div><div class="l">Items</div></div>
  </div>
</div>

<div class="wrap">
  <main id="MC">
    <div class="tabs" id="tabs">
      <button class="tab on" onclick="filt('all')" data-c="all">All <span class="badge" id="badgeAll">0</span></button>
      <button class="tab" onclick="filt('fonts')" data-c="fonts">Fonts</button>
      <button class="tab" onclick="filt('backgrounds')" data-c="backgrounds">Backgrounds</button>
      <button class="tab" onclick="filt('psdprojects')" data-c="psdprojects">PSD Files</button>
    </div>

    <div id="vGrid">
      <div class="grid" id="mainGrid"></div>
    </div>

    <div id="vDetail" style="display:none">
       <button onclick="toGrid()" style="color:var(--red); margin-bottom:1rem">← Back to Grid</button>
       <div style="display:grid; grid-template-columns:1fr 1fr; gap:2rem">
          <div id="dPrev" style="height:300px; background:var(--bg2); display:flex; align-items:center; justify-content:center">PREVIEW</div>
          <div>
            <h2 id="dTitle" style="font-family:'Bebas Neue'; font-size:2.5rem"></h2>
            <p id="dDesc" style="color:var(--muted); margin:1rem 0"></p>
            <div class="dlp">
              <div id="gIdle" class="g-idle on"><button class="bwatch" onclick="startGate()">Watch Ad & Unlock</button></div>
              <div id="gWatch" class="g-watch" style="text-align:center">Ad is playing... <span id="rnum">5</span>s</div>
              <div id="gReady" class="g-ready"><button class="bdl" id="dlBtn" onclick="doDL()">Download Now</button></div>
            </div>
          </div>
       </div>
    </div>
  </main>
</div>

<a class="wa" href="https://wa.me/919999999999" target="_blank"><svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg></a>

<script>
let DB = [];
let activeCat = "all", activeItem = null, timer = null;
const apiURL = 'https://script.google.com/macros/s/AKfycbwYd3r_CQ7U4QqVWBw9_zAUTEwM_6Z5mdihCZ46O3-WPNJ6rDrKwfDn4desw8NvoFnQJw/exec';

async function loadData() {
  document.getElementById("mainGrid").innerHTML = "<p style='padding:20px'>Loading Drive assets...</p>";
  try {
    const res = await fetch(apiURL);
    DB = await res.json();
    document.getElementById("totalCount").textContent = DB.length;
    document.getElementById("badgeAll").textContent = DB.length;
    renderGrid("all");
  } catch (e) {
    document.getElementById("mainGrid").innerHTML = "<p style='padding:20px;color:red'>Failed to connect to Drive API.</p>";
  }
}

function renderGrid(cat) {
  activeCat = cat;
  const items = cat === "all" ? DB : DB.filter(x => x.c === cat);
  document.getElementById("mainGrid").innerHTML = items.map(item => `
    <div class="card" onclick="openItem('${item.id}')">
      <div class="cthumb tb">${item.fmt}</div>
      <div class="cinfo">
        <div class="ctitle">${item.title}</div>
        <div class="cmeta"><span>${item.sz}</span><span>${item.fmt}</span></div>
      </div>
    </div>
  `).join('');
}

function openItem(id) {
  activeItem = DB.find(x => x.id === id);
  document.getElementById("vGrid").style.display = "none";
  document.getElementById("vDetail").style.display = "block";
  document.getElementById("dTitle").textContent = activeItem.title;
  document.getElementById("dDesc").textContent = activeItem.desc;
  resetGate();
}

function toGrid() {
  document.getElementById("vGrid").style.display = "";
  document.getElementById("vDetail").style.display = "none";
}

function startGate() {
  document.getElementById("gIdle").classList.remove("on");
  document.getElementById("gWatch").classList.add("on");
  let rem = 5;
  timer = setInterval(() => {
    rem--;
    document.getElementById("rnum").textContent = rem;
    if(rem <= 0) {
      clearInterval(timer);
      document.getElementById("gWatch").classList.remove("on");
      document.getElementById("gReady").classList.add("on");
    }
  }, 1000);
}

function doDL() {
  window.open(activeItem.dlUrl, "_blank");
  document.getElementById("dlBtn").textContent = "✓ Download Started";
}

function resetGate() {
  if(timer) clearInterval(timer);
  document.getElementById("gIdle").classList.add("on");
  document.getElementById("gWatch").classList.remove("on");
  document.getElementById("gReady").classList.remove("on");
  document.getElementById("rnum").textContent = "5";
}

function filt(c) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("on", t.dataset.c === c));
  renderGrid(c);
}

window.onload = loadData;

// Cursor logic
const $c=document.getElementById("cur"),$r=document.getElementById("cur-r");
let mx=0,my=0,rx=0,ry=0;
document.addEventListener("mousemove",e=>{mx=e.clientX;my=e.clientY;$c.style.left=mx+"px";$c.style.top=my+"px"});
(function L(){rx+=(mx-rx)*.18;ry+=(my-ry)*.18;$r.style.left=rx+"px";$r.style.top=ry+"px";requestAnimationFrame(L)})();
</script>
</body>
</html>
