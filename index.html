<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Home &mdash; Reddy Design Studio</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<style>
[data-theme="dark"]{
  --bg:#080809;--bg2:#0f0f11;--bg3:#18181b;
  --sb:rgba(255,255,255,.08);--sb2:rgba(255,255,255,.04);
  --text:#f2efe9;--text2:#c4c0b8;--muted:#6b6b74;--muted2:#3a3a3f;
  --card:rgba(255,255,255,.04);--cborder:rgba(255,255,255,.09);
  --nav:rgba(8,8,9,.85);--inp:rgba(255,255,255,.04);
}
[data-theme="light"]{
  --bg:#f7f5f1;--bg2:#edeae6;--bg3:#e2dfd9;
  --sb:rgba(0,0,0,.1);--sb2:rgba(0,0,0,.05);
  --text:#1a1a1c;--text2:#3a3a40;--muted:#72727a;--muted2:#c0bdb8;
  --card:rgba(255,255,255,.8);--cborder:rgba(0,0,0,.1);
  --nav:rgba(247,245,241,.93);--inp:rgba(0,0,0,.05);
}
:root{--red:#E8192C;--rg:rgba(232,25,44,.38);--rd:rgba(232,25,44,.11);--green:#22c55e;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none;transition:background .35s,color .35s}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.022}
#cur{width:10px;height:10px;background:var(--red);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .12s}
#cur-r{width:32px;height:32px;border:1.5px solid rgba(232,25,44,.5);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:left .2s cubic-bezier(.22,1,.36,1),top .2s cubic-bezier(.22,1,.36,1),width .25s,height .25s}
body.chov #cur{transform:translate(-50%,-50%) scale(2.2);opacity:.6}
body.chov #cur-r{width:50px;height:50px;border-color:rgba(232,25,44,.7)}
nav{position:fixed;top:0;left:0;right:0;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 3.5rem;background:var(--nav);backdrop-filter:blur(24px) saturate(160%);border-bottom:1px solid var(--sb);transition:padding .3s,background .35s}
nav.scrolled{padding:.65rem 3.5rem}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;color:var(--text);text-decoration:none}
.logo span{color:var(--red)}
.nl{display:flex;gap:2rem;list-style:none;align-items:center}
.nl a{font-size:.7rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;position:relative;transition:color .2s}
.nl a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--red);transition:width .3s}
.nl a:hover,.nl a.active{color:var(--text)}
.nl a:hover::after,.nl a.active::after{width:100%}
.nav-r{display:flex;align-items:center;gap:.8rem}
.btn-th{background:var(--card);border:1px solid var(--sb);color:var(--muted);width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;line-height:1;transition:all .2s}
.btn-th:hover{border-color:var(--red);color:var(--red)}
.btn-adm{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:.38rem .9rem;background:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,color .2s}
.btn-adm:hover{background:var(--red);color:#fff}
.nav-cta{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:.44rem 1.1rem;text-decoration:none;transition:background .2s,color .2s}
.nav-cta:hover{background:var(--red);color:#fff}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none}
.burger span{display:block;width:22px;height:1.5px;background:var(--text)}
@media(max-width:900px){nav{padding:1rem 1.5rem}.nl,.nav-cta{display:none}.burger{display:flex}}
.drawer{display:none;position:fixed;inset:0;background:rgba(8,8,9,.97);z-index:795;flex-direction:column;align-items:center;justify-content:center;gap:2rem}
.drawer.open{display:flex}
.drawer a,.drawer .dl{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;letter-spacing:.08em;color:var(--text);text-decoration:none;background:none;border:none;cursor:pointer;transition:color .2s}
.drawer a:hover,.drawer .dl:hover{color:var(--red)}
.dx{position:absolute;top:1.4rem;right:1.8rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer}
.btn-red{background:var(--red);color:#fff;padding:.88rem 2.2rem;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;box-shadow:0 4px 24px var(--rg);transition:box-shadow .3s,transform .2s;display:inline-block;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-red:hover{box-shadow:0 8px 40px rgba(232,25,44,.6);transform:translateY(-2px)}
.btn-ghost{color:var(--muted);border:1px solid var(--sb);padding:.85rem 2.2rem;font-size:.75rem;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem;transition:color .2s,border-color .2s;background:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-ghost:hover{color:var(--text);border-color:rgba(255,255,255,.25)}
section{padding:7rem 3.5rem}
@media(max-width:768px){section{padding:5rem 1.5rem}}
.sec-tag{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:.8rem;display:flex;align-items:center;gap:.7rem}
.sec-tag::before{content:'';width:22px;height:1px;background:var(--red)}
.sec-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:1rem;color:var(--text)}
.sec-title em{font-style:italic;color:var(--red)}
.ph{padding:10rem 3.5rem 5rem;border-bottom:1px solid var(--sb);position:relative;overflow:hidden}
.ph::before{content:'';position:absolute;top:0;right:0;width:500px;height:500px;background:radial-gradient(circle,rgba(232,25,44,.055),transparent 65%);pointer-events:none}
.ph-tag{font-size:.65rem;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:.9rem;display:flex;align-items:center;gap:.7rem}
.ph-tag::before{content:'';width:20px;height:1px;background:var(--red)}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,8vw,7rem);line-height:.95;opacity:0;animation:fu .9s .25s forwards}
.ph-title span{color:var(--red)}
.ph-sub{max-width:520px;font-size:1rem;line-height:1.8;color:var(--muted);margin-top:1rem;opacity:0;animation:fu .9s .45s forwards}
@media(max-width:768px){.ph{padding:8rem 1.5rem 3.5rem}}
.waf{position:fixed;bottom:2rem;right:2rem;z-index:850;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#25d366,#1da851);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(37,211,102,.35);text-decoration:none;animation:wap 2.5s ease-in-out infinite;transition:transform .2s}
.waf:hover{transform:scale(1.1)}
.waf svg{width:26px;height:26px;fill:#fff}
@keyframes wap{0%,100%{box-shadow:0 8px 28px rgba(37,211,102,.35),0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 8px 28px rgba(37,211,102,.5),0 0 0 14px rgba(37,211,102,0)}}
footer{background:var(--bg2);border-top:1px solid var(--sb);padding:2.5rem 3.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.flogo{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.1em;color:var(--text)}
.flogo span{color:var(--red)}
.fcopy{font-size:.7rem;color:var(--muted)}
.fsocs{display:flex;gap:.6rem}
.fsoc{width:32px;height:32px;border:1px solid var(--sb);display:flex;align-items:center;justify-content:center;color:var(--muted);text-decoration:none;font-size:.65rem;font-weight:700;transition:all .2s}
.fsoc:hover{border-color:var(--red);color:var(--red)}
@media(max-width:600px){footer{padding:2rem 1.5rem}.fcopy{order:3;width:100%;text-align:center}}
.adm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:3000;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.adm-modal.open{display:flex}
.adm-box{background:var(--bg2);border:1px solid var(--sb);width:90%;max-width:440px;padding:2.5rem;position:relative}
.adm-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--red),transparent)}
.adm-close-btn{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);font-size:1.3rem;cursor:pointer}
.adm-close-btn:hover{color:var(--red)}
.adm-title{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--text);margin-bottom:.3rem}
.adm-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.8rem}
.adm-err{display:none;background:rgba(232,25,44,.08);border:1px solid rgba(232,25,44,.2);padding:.7rem 1rem;font-size:.8rem;color:var(--red);margin-bottom:1rem}
.fin{background:var(--inp);border:1px solid var(--sb);color:var(--text);padding:.78rem 1rem;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;width:100%;-webkit-appearance:none;resize:none}
.fin::placeholder{color:var(--muted);opacity:.65}
.fin:focus{border-color:var(--red)}
.fin option{background:var(--bg2)}
.flabel{font-size:.64rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem}
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s,transform .7s}
.reveal.vis{opacity:1;transform:translateY(0)}
@keyframes fu{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);color:#fff;padding:.75rem 1.8rem;font-size:.8rem;letter-spacing:.05em;z-index:9999;opacity:0;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .3s;pointer-events:none;white-space:nowrap;border-radius:3px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:#E8192C}
.toast.ok{background:var(--green)}
.toast.warn{background:#f59e0b}
/* Portfolio grid shared */
.pf-grid-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--sb)}
@media(max-width:800px){.pf-grid-wrap{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.pf-grid-wrap{grid-template-columns:1fr}}
.pf-item{position:relative;aspect-ratio:4/3;overflow:hidden;cursor:pointer;background:var(--bg3)}
.pf-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.pf-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.22,1,.36,1)}
/* Lightbox override — show full image */
.lb-media img{object-fit:contain !important;background:#000}
.lb-media video{object-fit:contain !important;background:#000}
.pf-item:hover .pf-img,.pf-item:hover .pf-vid{transform:scale(1.07)}
.pf-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem}
.pf-placeholder svg{width:32px;height:32px;color:rgba(255,255,255,.06)}
.pf-bg-grad{position:absolute;inset:0}
.pf1{background:linear-gradient(135deg,#1a0509,#2a0a10)}
.pf2{background:linear-gradient(135deg,#080d1a,#101528)}
.pf3{background:linear-gradient(135deg,#0d1a08,#121f0e)}
.pf4{background:linear-gradient(135deg,#1a1508,#22190b)}
.pf5{background:linear-gradient(135deg,#10051a,#1a0a28)}
.pf6{background:linear-gradient(135deg,#1a0808,#200d0d)}
.pf7{background:linear-gradient(135deg,#051a14,#0a2820)}
.pf8{background:linear(135deg,#1a1a05,#222205)}
.pf9{background:linear-gradient(135deg,#0d0d1a,#141422)}
.pf-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,9,.95) 0%,rgba(8,8,9,.4) 60%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:1.6rem;opacity:0;transition:opacity .35s;z-index:2}
.pf-item:hover .pf-ov{opacity:1}
.pf-cat-lbl{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.3rem}
.pf-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;color:var(--text)}
.pf-zoom{margin-top:.6rem;font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:var(--red);display:flex;align-items:center;gap:.4rem}
.pf-corner{position:absolute;top:0;right:0;z-index:3;width:0;height:0;border-style:solid;border-width:0 24px 24px 0;border-color:transparent var(--red) transparent transparent;opacity:0;transition:opacity .3s}
.pf-item:hover .pf-corner{opacity:1}
.pf-feat-badge{position:absolute;top:.7rem;left:.7rem;z-index:4;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;background:var(--red);color:#fff;padding:.18rem .6rem}
.pf-vid-badge{position:absolute;bottom:.6rem;right:.6rem;z-index:4;background:rgba(0,0,0,.75);color:#fff;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;padding:.18rem .6rem}
/* Lightbox */
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(10px);padding:1rem}
.lb.open{display:flex}
.lb-box{background:var(--bg2);border:1px solid var(--sb);max-width:900px;width:95%;position:relative;max-height:95vh;overflow-y:auto}
.lb-cls{position:absolute;top:1rem;right:1rem;background:rgba(0,0,0,.5);border:1px solid var(--sb);color:var(--text);font-size:1.3rem;cursor:pointer;transition:color .2s;z-index:10;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
.lb-cls:hover{color:var(--red);border-color:var(--red)}
.lb-media{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;max-height:70vh;min-height:200px}
.lb-media img{width:100%;height:auto;max-height:70vh;object-fit:contain;display:block}
.lb-media video{width:100%;height:auto;max-height:70vh;object-fit:contain;display:block}
.lb-media-ph{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:rgba(232,25,44,.12);line-height:1;padding:3rem}
.lb-media-ph{font-family:'Bebas Neue',sans-serif;font-size:8rem;color:rgba(232,25,44,.12);line-height:1}
.lb-body{padding:2rem}
.lb-cl{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
.lb-cl::before{content:'';width:14px;height:1px;background:var(--red)}
.lb-ti{font-family:'Syne',sans-serif;font-size:1.7rem;font-weight:800;color:var(--text);margin-bottom:.7rem}
.lb-de{font-size:.88rem;line-height:1.78;color:var(--muted);margin-bottom:1.2rem}
.lb-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.5rem}
.lb-tag{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;background:var(--rd);color:var(--red);padding:.2rem .6rem}
.lb-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;border-top:1px solid var(--sb);padding-top:1.2rem}
.lb-mk{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem;text-align:center}
.lb-mv{font-size:.88rem;color:var(--text);font-weight:500;text-align:center}

/* HERO */
#hero{position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:8rem 3.5rem 5rem;overflow:hidden}
#hc{position:absolute;inset:0;z-index:0}
.hgrid{position:absolute;inset:0;background-image:linear-gradient(rgba(232,25,44,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(232,25,44,.035) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 30%,transparent 100%);z-index:1}
.hcont{position:relative;z-index:2}
.htag{font-size:.68rem;letter-spacing:.24em;text-transform:uppercase;color:var(--red);margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem;opacity:0;animation:fu .8s .3s forwards}
.htag::before{content:'';width:28px;height:1px;background:var(--red)}
.htitle{font-family:'Bebas Neue',sans-serif;font-size:clamp(4.5rem,10vw,10rem);line-height:.9;letter-spacing:.02em;margin-bottom:2rem;opacity:0;animation:fu .9s .5s forwards}
.htitle .red{color:var(--red)}
.htitle .ol{-webkit-text-stroke:1px rgba(232,25,44,.3);color:transparent}
.hsub{max-width:480px;font-size:1rem;line-height:1.8;color:var(--muted);margin-bottom:3rem;opacity:0;animation:fu .9s .7s forwards}
.hbtns{display:flex;gap:1rem;flex-wrap:wrap;opacity:0;animation:fu .9s .9s forwards}
.sind{position:absolute;bottom:2.5rem;right:3.5rem;z-index:2;writing-mode:vertical-rl;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:.8rem}
.sind::after{content:'';width:1px;height:56px;background:linear-gradient(to bottom,var(--muted),transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{transform:scaleY(0);transform-origin:top;opacity:0}40%{transform:scaleY(1);transform-origin:top;opacity:1}60%{transform:scaleY(1);transform-origin:bottom;opacity:1}100%{transform:scaleY(0);transform-origin:bottom;opacity:0}}
@media(max-width:768px){#hero{padding:7rem 1.5rem 4rem}.sind{display:none}}
.mq-wrap{background:var(--red);overflow:hidden;white-space:nowrap;padding:.7rem 0}
.mq-track{display:inline-flex;gap:3rem;animation:mq 18s linear infinite}
.mq-track span{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.14em;color:rgba(255,255,255,.85)}
.dot{color:rgba(255,255,255,.4)}
@keyframes mq{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
/* Services */
.svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--sb);margin-top:3rem}
@media(max-width:900px){.svc-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.svc-grid{grid-template-columns:1fr}}
.svc-card{background:var(--bg2);padding:2.4rem 2rem;position:relative;overflow:hidden;cursor:default;transition:background .3s}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--red);transition:width .45s cubic-bezier(.22,1,.36,1)}
.svc-card:hover{background:var(--bg3)}
.svc-card:hover::after{width:100%}
.svc-num{font-family:'Bebas Neue',sans-serif;font-size:3rem;color:var(--rd);line-height:1;margin-bottom:1.2rem}
.svc-ico{width:40px;height:40px;color:var(--red);margin-bottom:1.2rem}
.svc-name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.7rem;color:var(--text)}
.svc-desc{font-size:.82rem;line-height:1.75;color:var(--muted)}
.stag{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;background:var(--rd);color:var(--red);padding:.2rem .55rem;margin:.2rem .2rem 0 0;display:inline-block}
/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;text-align:center}
@media(max-width:700px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat-n{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;color:var(--text);line-height:1}
.stat-n em{color:var(--red);font-style:normal}
.stat-l{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:.4rem}
/* Testimonials */
.tslider{position:relative;overflow:hidden;margin-top:3rem}
.ttrack{display:flex;transition:transform .5s cubic-bezier(.22,1,.36,1)}
.tcard{flex:0 0 100%;padding:2.5rem;background:var(--card);border:1px solid var(--cborder);position:relative}
.tcard::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--red)}
.tquote{font-size:3.5rem;font-family:'Bebas Neue',sans-serif;color:var(--red);opacity:.2;line-hei
