<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Portfolio — Reddy Design Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red:#E8192C; --bg:#080809; --bg2:#0f0f11;
      --glass:rgba(255,255,255,.035); --gb:rgba(255,255,255,.08);
      --text:#f2efe9; --muted:#6b6b74;
    }
    body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; cursor:none; overflow-x:hidden; }
    
    /* Cursor Customization */
    #cur{width:10px;height:10px;background:var(--red);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
    #cur-r{width:32px;height:32px;border:1px solid var(--red);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:all .2s}

    /* Navigation */
    nav { position:fixed; top:0; width:100%; z-index:1000; padding:1.2rem 3.5rem; background:rgba(8,8,9,.8); backdrop-filter:blur(20px); border-bottom:1px solid var(--gb); display:flex; justify-content:space-between; align-items:center; }
    .logo { font-family:'Bebas Neue'; font-size:1.6rem; letter-spacing:1px; text-decoration:none; color:white; }
    .logo span { color:var(--red); }

    /* Hero Section */
    .hero { padding:10rem 3.5rem 4rem; text-align:center; }
    .hero h1 { font-family:'Bebas Neue'; font-size:clamp(4rem, 10vw, 8rem); line-height:0.9; }
    .hero h1 span { color:var(--red); }

    /* Filter Tabs */
    .filter-tabs { display:flex; gap:1rem; justify-content:center; margin-bottom:3rem; flex-wrap:wrap; }
    .f-tab { padding:0.6rem 1.5rem; border:1px solid var(--gb); font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; cursor:pointer; transition:0.3s; color:var(--muted); }
    .f-tab.active, .f-tab:hover { background:var(--red); border-color:var(--red); color:white; }

    /* Masonry Grid Layout */
    .portfolio-grid { column-count: 3; column-gap: 1.5rem; padding: 0 3.5rem 6rem; }
    @media(max-width:1024px) { .portfolio-grid { column-count: 2; } }
    @media(max-width:640px) { .portfolio-grid { column-count: 1; padding: 0 1.5rem 4rem; } }

    .portfolio-item { break-inside: avoid; margin-bottom: 1.5rem; position: relative; overflow: hidden; background: var(--bg2); border: 1px solid var(--gb); cursor: pointer; }
    .portfolio-item img { width: 100%; height: auto; display: block; transition: 0.6s; }
    .portfolio-item:hover img { transform: scale(1.08); }
    
    .item-overlay { position: absolute; inset: 0; background: rgba(232,25,44,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.3s; padding: 2rem; text-align: center; }
    .portfolio-item:hover .item-overlay { opacity: 1; }
    .item-title { font-family: 'Bebas Neue'; font-size: 2rem; color: white; }

    /* Lightbox for Preview */
    #lightbox { position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; display:none; align-items:center; justify-content:center; }
    #lightbox img { max-width:90%; max-height:85vh; border:1px solid var(--gb); }
    .close-btn { position:absolute; top:2rem; right:2rem; font-size:2.5rem; cursor:pointer; color:white; }
  </style>
</head>
<body>

<div id="cur"></div>
<div id="cur-r"></div>

<nav>
  <a href="index.html" class="logo">Reddy<span>.</span></a>
  <div style="display:flex; gap:1.5rem">
    <a href="index.html" style="font-size:0.75rem; text-transform:uppercase; text-decoration:none; color:var(--muted)">Home</a>
    <a href="free-materials.html" style="font-size:0.75rem; text-transform:uppercase; text-decoration:none; color:var(--muted)">Free Materials</a>
  </div>
</nav>

<section class="hero">
  <div style="font-size:0.7rem; color:var(--red); letter-spacing:4px; text-transform:uppercase; margin-bottom:1rem">Showcase</div>
  <h1>Our <span>Creative</span> Portfolio</h1>
</section>

<div class="filter-tabs">
  <div class="f-tab active" onclick="filterItems('all')">All Work</div>
  <div class="f-tab" onclick="filterItems('graphic')">Graphics</div>
  <div class="f-tab" onclick="filterItems('social')">Social Media</div>
  <div class="f-tab" onclick="filterItems('video')">Video Assets</div>
</div>

<div class="portfolio-grid" id="mainGrid">
  <div class="portfolio-item graphic" onclick="openLB('https://via.placeholder.com/600x800')">
    <img src="https://via.placeholder.com/600x800" alt="Work 1" loading="lazy">
    <div class="item-overlay"><div class="item-title">Brand Design</div></div>
  </div>

  <div class="portfolio-item social" onclick="openLB('https://via.placeholder.com/600x600')">
    <img src="https://via.placeholder.com/600x600" alt="Work 2" loading="lazy">
    <div class="item-overlay"><div class="item-title">Instagram Post</div></div>
  </div>

  <div class="portfolio-item video" onclick="openLB('https://via.placeholder.com/600x900')">
    <img src="https://via.placeholder.com/600x900" alt="Work 3" loading="lazy">
    <div class="item-overlay"><div class="item-title">YouTube Intro</div></div>
  </div>
</div>

<div id="lightbox" onclick="this.style.display='none'">
  <span class="close-btn">&times;</span>
  <img id="lbImage" src="">
</div>

<script>
  // Filter Functionality
  function filterItems(category) {
    const items = document.querySelectorAll('.portfolio-item');
    document.querySelectorAll('.f-tab').forEach(tab => tab.classList.remove('active'));
    event.target.classList.add('active');

    items.forEach(item => {
      if (category === 'all' || item.classList.contains(category)) {
        item.style.display = 'block';
      } else {
        item.style.display = 'none';
      }
    });
  }

  // Lightbox Preview Function
  function openLB(src) {
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lbImage');
    img.src = src;
    lb.style.display = 'flex';
  }

  // Custom Cursor Script
  const cur = document.getElementById('cur'), curR = document.getElementById('cur-r');
  let mx = 0, my = 0, rx = 0, ry = 0;
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cur.style.left = mx + 'px'; cur.style.top = my + 'px';
  });
  (function update() {
    rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
    curR.style.left = rx + 'px'; curR.style.top = ry + 'px';
    requestAnimationFrame(update);
  })();

  // Hover Effect for interactive elements
  document.querySelectorAll('.portfolio-item, .f-tab, a').forEach(el => {
    el.addEventListener('mouseenter', () => { curR.style.transform = 'translate(-50%, -50%) scale(2)'; curR.style.background = 'rgba(232, 25, 44, 0.1)'; });
    el.addEventListener('mouseleave', () => { curR.style.transform = 'translate(-50%, -50%) scale(1)'; curR.style.background = 'transparent'; });
  });
</script>

</body>
</html>
